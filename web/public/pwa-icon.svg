<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffc2d6"/>
      <stop offset="1" stop-color="#f58cae"/>
    </linearGradient>
    <linearGradient id="petal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffdbe8"/>
    </linearGradient>
    <!-- one petal, tip up with a small V notch, base at the flower centre (256,256) -->
    <g id="p">
      <path fill="url(#petal)" stroke="#f7a8c4" stroke-width="4" stroke-linejoin="round"
        d="M256 256
           C206 232 194 150 228 104
           C237 92 244 92 250 108
           L256 122 L262 108
           C268 92 275 92 284 104
           C318 150 306 232 256 256 Z"/>
    </g>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- 5 petals radiating from the centre (72° apart) -->
  <use href="#p" transform="rotate(0 256 256)"/>
  <use href="#p" transform="rotate(72 256 256)"/>
  <use href="#p" transform="rotate(144 256 256)"/>
  <use href="#p" transform="rotate(216 256 256)"/>
  <use href="#p" transform="rotate(288 256 256)"/>

  <!-- centre: stamens -->
  <circle cx="256" cy="256" r="22" fill="#ffe6a0"/>
  <g fill="#ffb54d">
    <circle cx="256" cy="230" r="6"/>
    <circle cx="281" cy="248" r="6"/>
    <circle cx="271" cy="278" r="6"/>
    <circle cx="241" cy="278" r="6"/>
    <circle cx="231" cy="248" r="6"/>
  </g>
</svg>
